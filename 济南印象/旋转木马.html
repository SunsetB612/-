<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旋转木马</title>
    <style>
        body {
            perspective: 60000px;
            background: url(images/background.png) repeat;
        }

        section {
            position: relative;
            width: 1706px;
            height: 1279px;
            margin: 800px auto;
            transform-style: preserve-3d;
            animation: rotate 12s linear infinite;
            background: url(images/7.jpg) no-repeat;
        }

        @keyframes rotate {
            0% {}

            100% {
                transform: rotateY(360deg);
            }
        }

        section:hover {
            animation-play-state: paused;
        }

        section div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        section div:nth-child(1) {
            background: url(images/1.jpg) no-repeat;
            transform: translateZ(2000px);
        }

        section div:nth-child(2) {
            background: url(images/2.jpg) no-repeat;
            transform: rotateY(60deg) translateZ(2500px);
        }

        section div:nth-child(3) {
            background: url(images/3.jpg) no-repeat;
            transform: rotateY(120deg) translateZ(2000px);
        }

        section div:nth-child(4) {
            background: url(images/4.jpg) no-repeat;
            transform: rotateY(180deg) translateZ(2000px);
        }

        section div:nth-child(5) {
            background: url(images/5.jpg) no-repeat;
            transform: rotateY(240deg) translateZ(2000px);
        }

        section div:nth-child(6) {
            background: url(images/6.jpg) no-repeat;
            transform: rotateY(300deg) translateZ(2000px);
        }
    </style>
</head>

<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>

</html>
